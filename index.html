<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flight Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="style.css">


    <link rel="icon" href="data:,">
    
</head>
<body>
    <div id="header">
        <h1>MY Flight Map</h1>
        <div id="visit_country">
            <span class="country_label">訪れた国</span>
            <span id="country_count"></span>
            <span class="country_unit">カ国</span>
        </div>
    </div>

    <div id="sidebar">

        <div style="height: 85px;"></div>

        <div id="airport-search">
            <input type="search" id="airport-input" placeholder="例：HND,NRT">
            <button id="search-btn">検索</button>
        </div>

        <div id="search-result"></div>
    
        <h3>フライト一覧</h3>

        <div id="new-flight">
            <button id="flight-btn">＋フライト登録</button> 
            <button id="reset-btn">🌍 全体マップに戻る</button>
        </div>


        <div id="flight-menu"></div>
        

    </div>    

        <div id="flight-addition">
             <form>
                 <label for="airport-from">出発地</label>
                 <input type="text" id="airport-from">
                 <input type="hidden" id="airport-from-iata">
                 <div id="from-result"></div>
                        
                <label for="airport-to">到着地</label>
                <input type="text" id="airport-to">
                <input type="hidden" id="airport-to-iata">
                <div id="to-result"></div>
                    
                <label for="flight-date">日付</label>
                <input type="date" id="flight-date">
                        
                <label for="flight-number">便名</label>
                <input type="text" id="flight-number">
                <input type="hidden" id="flight-number-airlineCode">
                <div id="number-result"></div>
                            
                    <div id="flight-add">
                        <button id="new-add">追加</button>
                    </div>
                </form>

                <div id="flight-close">
                    <button id="close-btn">&times;</button>
                </div>

                <label for ="photo-file">写真を追加</label>
                <input type="file" accept="image/*" id="photo-file">
        </div>
    


    
    <div id="hamburger-btn">
        <span></span>
        <span></span>
        <span></span>
    </div>

    
    <div id="map"></div>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/leaflet.geodesic/dist/leaflet.geodesic.umd.min.js"></script>

    <script src="https://rawcdn.githack.com/ewoken/Leaflet.MovingMarker/master/MovingMarker.js"></script>

    

    <script src="script.js"></script>

    <div id="photo-overlay" class="hidden">
         <button id="close-overlay">&times;</button>

        <div class="overlay-content">
            <h3 id="photo-title"></h3>
            <div id="photo-gallery"></div> 
        </div>
    </div>

</body>
</html>
